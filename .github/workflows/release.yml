name: Euclid Release on push

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: x86_64-unknown-linux-gnu
          - os: macos-latest
            artifact: apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.6"
          cabal-version: "3.10.3.0"

      - name: Update package index
        run: cabal update

      - name: Build
        run: cabal build exe:euclid

      - name: Install executable
        run: |
          mkdir -p dist/bin
          cabal install exe:euclid --installdir=dist/bin --install-method=copy --overwrite-policy=always

      - name: Package
        run: |
          tar czf euclid-${{ github.ref_name }}-${{ matrix.artifact }}.tar.gz -C dist/bin euclid

      - uses: actions/upload-artifact@v4
        with:
          name: euclid-${{ matrix.artifact }}
          path: euclid-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -lh euclid-*.tar.gz

      - uses: softprops/action-gh-release@v2
        with:
          files: euclid-*.tar.gz
          generate_release_notes: true
